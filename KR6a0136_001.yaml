body:
  text: 西晉沙門釋法炬譯如是我聞一時婆伽婆在舍衛城祇樹給孤獨園與大比丘衆千二百五十人俱為人敬仰悉來供養比丘比丘尼優婆塞優婆夷大王大子群臣下至人民悉來供養具衣被飲食床臥疾瘦醫藥爾時世尊名德遠聞如是世尊如來至真等正覺明行成為善逝世間解無上士道法御天人師佛世尊為衆生說法初善中善竟善義甚深遠具諸梵行爾時摩竭王頻毗娑羅告諸群臣汝等嚴駕羽葆車所以然者我欲往迦尸拘薩羅國問訊世尊禮拜承事世尊出世甚難值亦甚難遇如來時時出世譬如優曇鉢華時乃出世世尊亦復如是亦甚難遇對曰如是大王爾時群臣聞摩竭國王頻毗顏色娑羅端正教便嚴駕羽葆車往詣王頻毗娑羅所便白王言車已嚴駕今正是時爾時摩竭王頻毗娑羅乘羽葆車群臣人民前後圍繞從羅閲城出以王威力漸漸往詣迦尸拘薩羅至舍衛城祇樹給孤獨園乘車至城門從車下步往詣祇桓至如來所猶如剎利王捨五威儀頭面禮世尊足以手摩抆世尊足自稱姓名我是摩竭國頻毗娑羅王中之王是頻毗娑羅王爾時世尊告頻毗娑羅王汝是大王剎利豪族我是釋子出家學道於此色身衆德具足乃屈大王至我所問訊起居康強叉手承事王白世尊曰蒙世尊恩我亦見剎利有智慧多聞者婆羅門有智慧者長者有智慧者沙門有智慧者各共論義我以此論盡往問沙門瞿曇若彼沙門瞿曇答以此論者我等以此論答若瞿曇沙門不答此論者亦當共論義便往至世尊所爾時世尊與說法從世尊聞法不復問論義況當有所難便歸命世尊法比丘僧是謂世尊身有功德說微妙法知時之行是時得等三歡喜於世尊所復有恭敬大聲聞衆行皆清白戒成就三昧成就智慧成就解脫成就解脫見慧成就所謂四雙八輩是謂世尊聲聞衆可敬可貴為第一尊是世間人民無上福田是謂第三歡喜於三耶三佛所爾時摩竭國王頻毗娑羅從佛聞微妙法聞微妙法已白世尊言願如來受我三月請遊羅閲城當供養衣被飲食床臥具病瘦醫藥及比丘僧爾時世尊默然受頻毗娑羅王請爾時摩竭國王頻毗娑羅王見世尊默然受請便歡喜踊躍不能自勝即從坐起頭面禮世尊足右繞三匝便退而去祇桓門乘羽葆車還詣羅閲祇城自宮殿所爾時摩竭國王頻毗娑羅敕諸大臣人民卿等善聽我欲請世尊於此三月及比丘僧供養衣被飲食床臥具病瘦醫藥汝等各相勸率答曰如是大王爾時摩竭國王頻毗娑羅在獨處坐便作是念我有資財能有所辦欲盡形壽供養世尊衣被飲食床臥具病瘦醫藥及比丘僧當率勸大臣人民爾時摩竭國王頻毗娑羅即日勸率諸大臣我向者在獨處坐便生是念我有資財能有所辦欲盡形壽供養世尊衣被飲食床臥具病瘦醫藥及比丘僧我應敕群臣人民卿等隨其種類請佛及比丘僧汝等長夜受報無窮答曰如是大王群臣人民從王聞教已爾時世尊遊在舍衛城便出人間遊行與大比丘衆千二百五十人俱漸往詣羅閲祇爾時世尊住竹林迦蘭檀園與大比丘衆千二百五十人俱爾時摩竭國王頻毗娑羅聞佛至羅閲祇城住竹園迦蘭陀所與大比丘衆千二百五十人俱爾時王頻毗娑羅敕諸群臣速嚴駕羽葆車往詣迦蘭陀所問訊世尊爾時群臣聞摩竭國頻毗娑羅敕便往嚴駕羽葆車白頻毗娑羅曰車已嚴駕今正是時爾時摩竭國王頻毗娑羅便乘羽葆車群臣人民前後圍繞以王威勢出羅閲城往詣竹園迦蘭陀所便下車步入迦蘭陀詣世尊所猶如剎利王有五威儀謂劍金屣蓋天冠珠柄拂皆捨一面頭面禮世尊足在一面坐爾時摩竭國王頻毗娑羅白世尊言自還國已來在獨處坐便生是念我典此國界所有資財能有所辦欲盡形壽供養如來及比丘衆衣被飲食床臥具病瘦醫藥亦當勸率臣人民使得蒙度使長夜得離三塗永處安隱爾時世尊告摩竭國王頻毗娑羅善哉善哉大王為衆生故發弘誓意欲安隱衆生義理深遠天人得安爾時世尊為摩竭國王頻毗娑羅說微妙法勸樂令聞皆令歡樂爾時摩竭國王頻毗娑羅從佛聞微妙法發歡喜心即從坐起禮世尊足繞佛三匝即退而去出迦蘭陀門還自乘車詣羅閲城入自宮裏坐其殿上即其日辦具甘饌飲食若干種味即其日為佛比丘僧敷衆坐具手執香爐升高樓上東向叉手至心念世尊亦自思惟今時已到願世尊知時見顧爾時世尊知時已到便著衣持鉢比丘僧前後圍繞入羅閲城往詣摩竭國王頻毗娑羅宮到已諸比丘僧各次第坐爾時摩竭國王頻毗娑羅見佛比丘僧坐已定自手執若干種甘饌飲食飯佛及比丘僧見世尊飯已攝鉢更敷小床在如來前坐爾時世尊為摩竭國王頻毗娑羅說微妙法漸漸共議所謂論者施論戒論生天論欲穢濁漏為大苦出家為要爾時世尊知王心歡喜不能自勝皆悉柔和猶如諸如來所應說法苦習盡道爾時世尊具為王說微妙法爾時二百五十婇女即於坐上逮法眼淨彼已見法得法選擇諸法奉持諸法無疑猶豫希望已斷得無所畏及所應學法歸依佛法衆受持五戒爾時世尊見王頻毗娑羅聞微妙法歡喜奉持爾時世尊便說此偈祠火最為首詩頌亦為首王為人中首衆流海為首衆星月為首光明日為首上下及四方諸所生品物天上及世間佛最無有上欲求種德者當求於三佛爾時世尊以此偈為王說即從坐起便退還去右一經經名譯主諸藏皆同而其文相國本宋本全同丹本大別似未知去取今按開元録云此經與增一阿含經第二十六卷等見品同本異譯撿之國宋二本與彼全同即是彼經中抄出耳何為異譯耶意者宋藏失法炬譯本遂抄彼本部為此別行然彼增一即東晉瞿曇僧伽提婆譯既抄彼經而云法炬譯者何耶況凡是抄經非異譯者開元録中曾被刪去此何獨存耶故今以丹藏為真本云
