  - {type: variant, offset: 1842, length: 154, content: 右一經，經名譯主諸藏皆同，而其文相，國本、宋本全同，丹本大別，似未知去取。今按《開元錄》云：「此經與《增一阿含經》第二十六卷〈等見品〉，同本異譯。」撿之國、宋二本，與彼全同，即是彼經中抄出耳，何為異譯耶？意者宋藏失法炬譯本，遂抄彼本部為此別行，然彼《增一》即東晉瞿曇僧伽提婆譯，既抄彼經，而云法炬譯者何耶？況凡是抄經非異譯者，《開元錄》中曾被刪去，此何獨存耶？故今以丹藏為真本云。, 宋: '', 元: '', 明: ''}
